<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Akertis &middot; Intelligent Risk Management</title>
<meta name="description" content="Akertis. Engineering confidence in risk management. Our full website is launching soon; senior advisory in financial risk is available now.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Figtree:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFF5F4; --paper2:#E4EEEC; --ink:#0C2030; --teal:#0E6E78;
    --muted:#51626B; --line:rgba(12,32,48,.14);
    --sans:'Plus Jakarta Sans',system-ui,sans-serif;
    --body:'Figtree',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; min-height:100%;
  }
  .top-accent{height:4px;width:100%;background:var(--teal)}
  main{
    flex:1 1 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:48px 24px;
  }
  .kicker{
    font-weight:500; font-size:13px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--teal); margin-bottom:22px;
  }
  .wordmark{
    font-family:var(--sans); font-weight:600; color:var(--ink);
    font-size:clamp(44px,9vw,84px); line-height:1; letter-spacing:-.01em;
  }
  .tagline{
    font-weight:400; color:var(--muted);
    font-size:clamp(15px,2.4vw,19px); margin-top:18px;
  }
  .rule{width:54px;height:1px;background:var(--line);margin:34px 0}
  .lede{
    font-weight:400; color:var(--ink); max-width:30rem; line-height:1.6;
    font-size:clamp(15px,2.2vw,17px);
  }
  .lede a{
    color:var(--teal); text-decoration:none;
    border-bottom:1px solid rgba(14,110,120,.32); padding-bottom:1px;
  }
  .lede a:hover{border-bottom-color:var(--teal)}
  footer{
    text-align:center; padding:26px 24px; background:var(--paper2);
    color:var(--muted); font-size:12.5px; letter-spacing:.02em;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>
  <div class="top-accent"></div>
  <main>
    <p class="kicker">Intelligent Risk Management</p>
    <h1 class="wordmark">Akertis</h1>
    <p class="tagline">Engineering Confidence in Risk Management</p>
    <div class="rule"></div>
    <p class="lede">Our full website is launching soon. In the meantime, we offer senior advisory in financial risk <a href="https://www.andreagraves.nz">here</a>.</p>
  </main>
  <footer>&copy; 2026 Akertis &middot; Intelligent Risk Management</footer>
</body>
</html>
